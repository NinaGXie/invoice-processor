<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Processor - 发票处理器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #030712; /* gray-950 */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #f3f4f6; /* gray-100 */
        }

        /* Header */
        header {
            border-bottom: 1px solid #1f2937; /* gray-800 */
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 600;
            color: #f3f4f6;
        }

        .header-title svg {
            color: #60a5fa; /* primary-400 */
        }

        .header-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 9999px;
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            font-weight: 500;
        }

        /* Main content */
        main {
            flex: 1;
            min-height: 0;
            padding: 40px 24px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .card {
            background: rgba(17, 24, 39, 0.5); /* gray-900/50 */
            border: 1px solid #1f2937; /* gray-800 */
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 560px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: #f9fafb;
            margin-bottom: 4px;
        }

        .card-subtitle {
            font-size: 13px;
            color: #6b7280; /* gray-500 */
            margin-bottom: 28px;
        }

        /* Flash messages */
        .flash-messages {
            margin-bottom: 20px;
        }

        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(185, 28, 28, 0.4);
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(21, 128, 61, 0.4);
        }

        /* Upload area */
        .upload-area {
            border: 2px dashed #374151; /* gray-700 */
            border-radius: 10px;
            padding: 48px 20px;
            text-align: center;
            background: rgba(31, 41, 55, 0.3); /* gray-800/30 */
            transition: all 0.2s ease;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .upload-area:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-area.dragover {
            border-color: #60a5fa;
            background: rgba(59, 130, 246, 0.1);
            transform: scale(1.01);
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            color: #4b5563; /* gray-600 */
        }

        .upload-text {
            color: #d1d5db; /* gray-300 */
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .upload-hint {
            color: #6b7280; /* gray-500 */
            font-size: 13px;
        }

        input[type="file"] {
            display: none;
        }

        /* File list */
        .file-list {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 180px;
            overflow-y: auto;
        }

        .file-list:empty {
            display: none;
        }

        .file-item {
            background: #1f2937; /* gray-800 */
            border: 1px solid #374151; /* gray-700 */
            padding: 10px 14px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-item-icon {
            color: #60a5fa;
            flex-shrink: 0;
        }

        .file-name {
            color: #e5e7eb; /* gray-200 */
            font-size: 13px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-size {
            color: #6b7280; /* gray-500 */
            font-size: 12px;
            flex-shrink: 0;
        }

        /* Button */
        .btn {
            background: #2563eb; /* primary-600 */
            color: white;
            border: none;
            padding: 11px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover:not(:disabled) {
            background: #3b82f6; /* primary-500 */
        }

        .btn:disabled {
            background: #1f2937; /* gray-800 */
            color: #6b7280; /* gray-500 */
            cursor: not-allowed;
        }

        /* Loading */
        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 16px;
            color: #9ca3af; /* gray-400 */
            font-size: 13px;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #374151;
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar styling */
        .file-list::-webkit-scrollbar {
            width: 4px;
        }
        .file-list::-webkit-scrollbar-track {
            background: #111827;
        }
        .file-list::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
            </svg>
            Invoice Processor
        </div>
        <img src="/static/biosheng_logo_v2.png" alt="Biosheng Logo" style="height: 36px; object-fit: contain;">
    </header>

    <main>
        <div class="card">
            <div class="card-title">批量处理发票</div>
            <div class="card-subtitle">上传 PDF 发票文件，自动提取数据并生成 Excel 汇总表</div>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for message in messages %}
                            <div class="alert alert-error">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form id="uploadForm" method="POST" action="/upload" enctype="multipart/form-data">
                <div class="upload-area" id="uploadArea">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 16 12 12 8 16"/>
                        <line x1="12" y1="12" x2="12" y2="21"/>
                        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
                    </svg>
                    <div class="upload-text">点击或拖拽上传 PDF 发票</div>
                    <div class="upload-hint">支持多个文件同时上传</div>
                    <input type="file" id="fileInput" name="files[]" multiple accept=".pdf">
                </div>

                <div class="file-list" id="fileList"></div>

                <button type="submit" class="btn" id="submitBtn" disabled>
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                    处理发票并生成 Excel
                </button>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    正在处理发票，请稍候...
                </div>
            </form>
        </div>
    </main>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const submitBtn = document.getElementById('submitBtn');
        const uploadForm = document.getElementById('uploadForm');
        const loading = document.getElementById('loading');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
            updateFileList();
        });

        fileInput.addEventListener('change', updateFileList);

        function updateFileList() {
            fileList.innerHTML = '';
            const files = fileInput.files;

            if (files.length === 0) {
                submitBtn.disabled = true;
                return;
            }

            submitBtn.disabled = false;

            for (let file of files) {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';

                fileItem.innerHTML = `
                    <svg class="file-item-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    <span class="file-name" title="${file.name}">${file.name}</span>
                    <span class="file-size">${formatFileSize(file.size)}</span>
                `;

                fileList.appendChild(fileItem);
            }
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        uploadForm.addEventListener('submit', () => {
            submitBtn.disabled = true;
            loading.classList.add('active');
        });
    </script>
</body>
</html>
