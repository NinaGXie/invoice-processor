<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>处理完成 - Invoice Processor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #030712;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #f3f4f6;
        }

        header {
            border-bottom: 1px solid #1f2937;
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 600;
            color: #f3f4f6;
        }

        .header-title svg {
            color: #60a5fa;
        }

        main {
            flex: 1;
            padding: 40px 24px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .card {
            background: rgba(17, 24, 39, 0.5);
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 560px;
            text-align: center;
        }

        .success-icon {
            width: 56px;
            height: 56px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: scaleIn 0.4s ease-out;
        }

        @keyframes scaleIn {
            0% { transform: scale(0); }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: #f9fafb;
            margin-bottom: 4px;
        }

        .card-subtitle {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 28px;
        }

        .info-box {
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid #374151;
            border-radius: 10px;
            padding: 4px 0;
            margin-bottom: 24px;
            text-align: left;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #1f2937;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #6b7280;
            font-size: 13px;
        }

        .info-value {
            color: #e5e7eb;
            font-size: 13px;
            font-weight: 500;
        }

        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 11px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.15s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .btn:hover {
            background: #3b82f6;
        }

        .btn-secondary {
            background: transparent;
            color: #9ca3af;
            border: 1px solid #374151;
        }

        .btn-secondary:hover {
            background: #1f2937;
            color: #e5e7eb;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
            </svg>
            Invoice Processor
        </div>
        <img src="/static/biosheng_logo_v2.png" alt="Biosheng Logo" style="height: 36px; object-fit: contain;">
    </header>

    <main>
        <div class="card">
            <div class="success-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>

            <div class="card-title">Processing Complete</div>
            <div class="card-subtitle">Your invoices have been processed and the Excel file is ready</div>

            <div class="info-box">
                <div class="info-item">
                    <span class="info-label">Files processed</span>
                    <span class="info-value">{{ count }}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Output file</span>
                    <span class="info-value">{{ filename }}</span>
                </div>
            </div>

            <a href="/download/{{ file_id }}" class="btn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download Excel
            </a>

            <a href="/" class="btn btn-secondary">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"/>
                    <path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
                </svg>
                Process more invoices
            </a>
        </div>
    </main>

    <script>
        setTimeout(function() {
            window.location.href = '/download/{{ file_id }}';
        }, 1000);
    </script>
</body>
</html>
